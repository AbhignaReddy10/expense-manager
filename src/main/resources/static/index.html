<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💰 Expense Manager</title>

<style>
body{
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#fff0f5,#f3e8ff);
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#ff6fa5;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff8fc7;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff6fa5;
}

.expense{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:#f9f9f9;
}
</style>

</head>

<body>

<div class="container">

<h2>💸 Add Expense</h2>

<input id="title" placeholder="Title">
<select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Entertainment</option>
    <option>Other</option>
    
</select>
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<button onclick="addExpense()">Add Expense</button>

<!-- ✅ NEW: Month Filter -->
<select id="monthFilter" onchange="loadExpenses()">
    <option value="">All Months</option>
    <option value="01">January</option>
    <option value="02">February</option>
    <option value="03">March</option>
    <option value="04">April</option>
    <option value="05">May</option>
    <option value="06">June</option>
    <option value="07">July</option>
    <option value="08">August</option>
    <option value="09">September</option>
    <option value="10">October</option>
    <option value="11">November</option>
    <option value="12">December</option>
</select>

<!-- ✅ NEW: Total -->
<h3 id="totalAmount">Total: ₹0</h3>

<h2>📋 My Expenses</h2>
<div id="expenseList"></div>

<button onclick="loadExpenses()">Refresh</button>

</div>

<script>

const BASE_URL = "https://expense-manager-production-b41a.up.railway.app";

// ✅ ADD EXPENSE
function addExpense() {

    const userId = localStorage.getItem("userId");

    if (!userId) {
        alert("Please login first");
        return;
    }

    const expense = {
        title: document.getElementById("title").value,
        category: document.getElementById("category").value,
        amount: parseFloat(document.getElementById("amount").value),
        date: document.getElementById("date").value
    };

    fetch(`${BASE_URL}/expenses/${userId}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(expense)
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        alert("Expense added successfully ✅");
        loadExpenses();
    })
    .catch(() => {
        alert("Failed to add expense ❌");
    });
}


// ✅ LOAD + FILTER + TOTAL
function loadExpenses(){

    const userId = localStorage.getItem("userId");
    const selectedMonth = document.getElementById("monthFilter").value;

    fetch(`${BASE_URL}/expenses/${userId}`)
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("expenseList");
        list.innerHTML = "";

        let total = 0;

        data.forEach(exp => {

            const month = exp.date.split("-")[1];

            if (selectedMonth && month !== selectedMonth) return;

            total += exp.amount;

            const div = document.createElement("div");
            div.className = "expense";

            div.innerHTML = `
                <b>${exp.title}</b> - ₹${exp.amount} <br>
                ${exp.category} | ${exp.date}
                <br>
                <button onclick="deleteExpense(${exp.id})">Delete</button>
            `;

            list.appendChild(div);
        });

        document.getElementById("totalAmount").innerText = "Total: ₹" + total;

    });
}


// ✅ DELETE EXPENSE
function deleteExpense(id){

    fetch(`${BASE_URL}/expenses/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadExpenses();
    });
}


// auto load on page open
loadExpenses();

</script>

</body>
</html>
