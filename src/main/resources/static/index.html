<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Expense Manager</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#ffe6f0,#fff0f5,#f3e8ff);
padding:40px;
display:flex;
justify-content:center;
}

.container{
width:420px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#ff6fa5;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
background:#fafafa;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:#ff8fc7;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#ff6fa5;
transform:scale(1.02);
}

.expense{
background:#fff7fb;
border-radius:12px;
padding:12px;
margin-top:12px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.delete-btn{
background:#ff6f6f;
border:none;
color:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
}

.total{
margin-top:20px;
padding:15px;
background:#f8f0ff;
border-radius:12px;
text-align:center;
font-size:18px;
font-weight:bold;
color:#6b4eff;
}

.logout{
background:#aaa;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<button class="logout" onclick="logout()">Logout</button>

<h2>Expense Manager</h2>

<input id="title" placeholder="✨ Expense title">

<select id="category">
<option value="" disabled selected>🍡 Select Category</option>
<option value="Food">🍜 Food</option>
<option value="Transport">🚕 Transport</option>
<option value="Shopping">🛍 Shopping</option>
<option value="Entertainment">🎮 Entertainment</option>
<option value="Bills">💡 Bills</option>
<option value="Other">🌈 Other</option>
</select>

<input id="amount" placeholder="💰 Amount">

<input id="date" type="date">

<button onclick="addExpense()">➕ Add Expense</button>

<h3 style="margin-top:25px;color:#888;">Your Expenses</h3>

<div id="expenses"></div>

<div class="total">
Total: ₹ <span id="total">0</span>
</div>

<h3 style="margin-top:25px;color:#888;">Spending by Category</h3>

<canvas id="expenseChart"></canvas>

</div>

<script>

const userId = localStorage.getItem("userId")

if(!userId){
alert("Please login first")
window.location.href="/login.html"
}

const API="http://localhost:8080/expenses"

let chart=null

function loadExpenses(){

fetch(`${API}/${userId}`)
.then(res=>res.json())
.then(data=>{

let html=""

if(data.length===0){
document.getElementById("expenses").innerHTML =
"<p style='text-align:center;color:#999'>No expenses yet</p>"
loadChart([])
return
}

data.forEach(e=>{

html+=`
<div class="expense">
<div>
<strong>${e.title}</strong><br>
${e.category} • ₹${e.amount}
</div>
<button class="delete-btn" onclick="deleteExpense(${e.id})">Delete</button>
</div>
`

})

document.getElementById("expenses").innerHTML=html

loadChart(data)

})

fetch(`${API}/total/${userId}`)
.then(res=>res.text())
.then(total=>{
document.getElementById("total").innerText=total
})

}

function addExpense(){

const expense={

title:document.getElementById("title").value,
category:document.getElementById("category").value,
amount:document.getElementById("amount").value,
date:document.getElementById("date").value

}

fetch(`${API}/${userId}`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(expense)
})
.then(()=>{
clearForm()
loadExpenses()
})

}

function deleteExpense(id){

fetch(`${API}/${id}`,{
method:"DELETE"
})
.then(()=>loadExpenses())

}

function clearForm(){

document.getElementById("title").value=""
document.getElementById("category").value=""
document.getElementById("amount").value=""
document.getElementById("date").value=""

}

function logout(){

localStorage.removeItem("userId")
window.location.href="/login.html"

}

function loadChart(data){

let categoryTotals={}

data.forEach(e=>{

if(categoryTotals[e.category]){
categoryTotals[e.category]+=Number(e.amount)
}else{
categoryTotals[e.category]=Number(e.amount)
}

})

const labels=Object.keys(categoryTotals)
const values=Object.values(categoryTotals)

if(chart){
chart.destroy()
}

const ctx=document.getElementById("expenseChart")

chart=new Chart(ctx,{
type:'pie',
data:{
labels:labels,
datasets:[{
data:values
}]
}
})

}

loadExpenses()

</script>

</body>
</html>
