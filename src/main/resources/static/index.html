<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💰 Expense Manager</title>

<style>
body{
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#fff0f5,#f3e8ff);
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#ff6fa5;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:10px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff8fc7;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#ff6fa5;
}

.expense{
    margin-top:10px;
    padding:10px;
    border-radius:10px;
    background:#f9f9f9;
}

.total{
    margin-top:15px;
    font-weight:bold;
    color:#ff6fa5;
}
</style>

</head>

<body>

<div class="container">

<h2>💸 Add Expense</h2>

<input id="title" placeholder="Title">
<select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Entertainment </option>
    <option>Other</option>
</select
<input id="amount" type="number" placeholder="Amount">
<input id="date" type="date">

<button onclick="addExpense()">Add Expense</button>

<h2>📅 Filter by Month</h2>

<select id="month">
    <option value="">Select Month</option>
    <option value="01">Jan</option>
    <option value="02">Feb</option>
    <option value="03">Mar</option>
    <option value="04">Apr</option>
    <option value="05">May</option>
    <option value="06">Jun</option>
    <option value="07">Jul</option>
    <option value="08">Aug</option>
    <option value="09">Sep</option>
    <option value="10">Oct</option>
    <option value="11">Nov</option>
    <option value="12">Dec</option>
</select>

<select id="year">
    <option value="">Select Year</option>
</select>

<button onclick="loadFilteredExpenses()">View Expenses</button>

<h2>📋 My Expenses</h2>
<div id="expenseList"></div>

<div class="total" id="totalExpense"></div>

<button onclick="logout()">Logout</button>

</div>

<script>

const BASE_URL = "https://expense-manager-production-b41a.up.railway.app";


// ✅ SESSION CHECK
const userId = localStorage.getItem("userId");

if (!userId) {
    alert("Please login first");
    window.location.href = "/login.html";
}


// ✅ ADD EXPENSE
function addExpense() {

    const expense = {
        title: document.getElementById("title").value,
        category: document.getElementById("category").value,
        amount: parseFloat(document.getElementById("amount").value),
        date: document.getElementById("date").value
    };

    fetch(`${BASE_URL}/expenses/${userId}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(expense)
    })
    .then(res => {
        if (!res.ok) throw new Error();
        return res.json();
    })
    .then(() => {
        alert("Expense added successfully ✅");

        // clear inputs
        document.getElementById("title").value = "";
        document.getElementById("amount").value = "";
        document.getElementById("date").value = "";

        loadExpenses();
    })
    .catch(() => {
        alert("Failed to add expense ❌");
    });
}


// ✅ LOAD ALL EXPENSES
function loadExpenses(){

    fetch(`${BASE_URL}/expenses/${userId}`)
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("expenseList");
        list.innerHTML = "";

        data.forEach(exp => {
            renderExpense(exp, list);
        });

        document.getElementById("totalExpense").innerText = "";
    });
}


// ✅ FILTER EXPENSES
function loadFilteredExpenses(){

    const selectedMonth = document.getElementById("month").value;
    const selectedYear = document.getElementById("year").value;

    fetch(`${BASE_URL}/expenses/${userId}`)
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("expenseList");
        list.innerHTML = "";

        let total = 0;

        data.forEach(exp => {

            const date = new Date(exp.date);
            const month = String(date.getMonth() + 1).padStart(2,'0');
            const year = String(date.getFullYear());

            if(month === selectedMonth && year === selectedYear){

                total += exp.amount;
                renderExpense(exp, list);

            }

        });

        document.getElementById("totalExpense").innerText =
        `Total: ₹${total}`;

    });
}


// ✅ DELETE EXPENSE
function deleteExpense(id){

    fetch(`${BASE_URL}/expenses/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        loadExpenses();
    });

}


// ✅ RENDER EXPENSE
function renderExpense(exp, list){

    const div = document.createElement("div");
    div.className = "expense";

    div.innerHTML = `
        <b>${exp.title}</b> - ₹${exp.amount} <br>
        ${exp.category} | ${exp.date}
        <br>
        <button onclick="deleteExpense(${exp.id})">Delete</button>
    `;

    list.appendChild(div);
}


// ✅ LOGOUT
function logout() {
    localStorage.removeItem("userId");
    alert("Logged out successfully 👋");
    window.location.href = "/login.html";
}


// ✅ DYNAMIC YEARS
function populateYears() {

    const yearSelect = document.getElementById("year");
    const currentYear = new Date().getFullYear();

    for (let i = 0; i <= 100; i++) {

        const year = currentYear + i;

        const option = document.createElement("option");
        option.value = year;
        option.textContent = year;

        yearSelect.appendChild(option);
    }
}


// INIT
populateYears();
loadExpenses();

</script>

</body>
</html>
